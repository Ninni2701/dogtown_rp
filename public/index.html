<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogtown Edgerunners RP</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; image-rendering: pixelated; }

        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); padding: 30px; border: 2px solid #00ff00;
            color: #00ff00; text-align: center; z-index: 20;
        }
        input { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin-bottom: 20px; font-family: 'Courier New'; text-align: center;}
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: 'Courier New';}

        #inventory-ui {
            display: none; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%;
            background: rgba(20, 0, 0, 0.9); border: 2px solid #ff003c;
            color: #ff003c; z-index: 30; padding: 20px; box-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
        }
        .inv-header { border-bottom: 2px solid #ff003c; padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; overflow-y: auto; max-height: 80%; }
        .inv-item { background: rgba(255, 0, 60, 0.1); border: 1px solid #ff003c; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .inv-item:hover { background: rgba(255, 0, 60, 0.3); transform: scale(1.05); color: #fff; }
        .inv-item span { font-size: 30px; }
        .inv-item p { font-size: 10px; margin: 5px 0 0 0; text-align: center; }
        .hint { position: absolute; bottom: 10px; left: 10px; color: #00ff00; font-size: 12px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>DOGTOWN TERMINAL</h1>
        <input type="text" id="username" placeholder="Name..." maxlength="15"><br>
        <button id="start-btn">CONNECT</button>
    </div>

    <div id="inventory-ui">
        <div class="inv-header">INVENTORY // SYSTEM_OS_V.2077</div>
        <div class="inv-grid" id="inv-grid"></div>
        <div class="hint">DRÜCKE [I] ZUM SCHLIESSEN</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            backgroundColor: '#050505', physics: { default: 'arcade' },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let socket, myPlayerContainer, cursors, myData, keyE;
        let otherPlayers, walls, itemsOnGround = {};
        let isInvOpen = false;
        let interactText; // Der Text "E - Aufheben"

        function preload() {}

        function create() {
            const self = this;
            otherPlayers = this.physics.add.group();
            walls = this.physics.add.staticGroup();
            
            // Unsere Test-Wände
            walls.add(this.add.rectangle(400, 300, 200, 40, 0xff00ff));
            walls.add(this.add.rectangle(150, 150, 40, 150, 0x00ffff));

            // UI Text für Interaktionen (unsichtbar am Anfang)
            interactText = this.add.text(0, 0, "[E] Aufheben", { fontSize: '14px', fill: '#ffff00', backgroundColor: '#000' }).setOrigin(0.5).setVisible(false);

            cursors = this.input.keyboard.createCursorKeys();
            keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

            this.input.keyboard.on('keydown-I', () => {
                isInvOpen = !isInvOpen;
                document.getElementById('inventory-ui').style.display = isInvOpen ? 'block' : 'none';
                if(isInvOpen) updateInventoryUI();
            });

            document.getElementById('start-btn').onclick = () => {
                document.getElementById('ui-layer').style.display = 'none';
                this.socket = io();
                this.socket.emit('joinGame', { name: document.getElementById('username').value || "Choom" });
                setupSocketEvents(self);
            };
        }

        function setupSocketEvents(self) {
            self.socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (players[id].id === self.socket.id) {
                        myData = players[id];
                        addPlayer(self, players[id]);
                    } else {
                        addOtherPlayers(self, players[id]);
                    }
                });
            });

            // Lade die Items auf der Map
            self.socket.on('currentItems', (items) => {
                Object.keys(items).forEach(id => {
                    const item = items[id];
                    // Wir zeichnen das Emoji als Text in die Spielwelt
                    let sprite = self.add.text(item.x, item.y, item.icon, { fontSize: '24px' }).setOrigin(0.5);
                    sprite.itemId = item.id;
                    sprite.itemName = item.name;
                    itemsOnGround[item.id] = sprite;
                });
            });

            // Wenn ein Item von der Map verschwindet (aufgehoben wurde)
            self.socket.on('itemRemoved', (itemId) => {
                if(itemsOnGround[itemId]) {
                    itemsOnGround[itemId].destroy();
                    delete itemsOnGround[itemId];
                }
            });

            // Wenn der Server uns unser neues Inventar schickt
            self.socket.on('updateInventory', (newInventory) => {
                myData.inventory = newInventory;
                if(isInvOpen) updateInventoryUI(); // Direkt aktualisieren, falls offen
            });

            self.socket.on('newPlayer', (playerInfo) => { addOtherPlayers(self, playerInfo); });
            self.socket.on('playerMoved', (playerInfo) => {
                otherPlayers.getChildren().forEach((p) => { if (playerInfo.id === p.playerId) p.setPosition(playerInfo.x, playerInfo.y); });
            });
            self.socket.on('playerDisconnected', (id) => {
                otherPlayers.getChildren().forEach((p) => { if(p.playerId === id) p.destroy(); });
            });
        }

        function addPlayer(self, playerInfo) {
            myPlayerContainer = self.add.container(playerInfo.x, playerInfo.y);
            const rect = self.add.rectangle(0, 0, 32, 32, 0x00ff00);
            const label = self.add.text(0, -25, playerInfo.name, { fontSize: '12px', fill: '#00ff00' }).setOrigin(0.5);
            myPlayerContainer.add([rect, label]);
            
            self.physics.world.enable(myPlayerContainer);
            myPlayerContainer.body.setCollideWorldBounds(true);
            self.physics.add.collider(myPlayerContainer, walls);
        }

        function addOtherPlayers(self, playerInfo) {
            const c = self.add.container(playerInfo.x, playerInfo.y);
            c.add([self.add.rectangle(0, 0, 32, 32, playerInfo.color), self.add.text(0, -25, playerInfo.name, { fontSize: '12px', fill: '#fff' }).setOrigin(0.5)]);
            c.playerId = playerInfo.id;
            otherPlayers.add(c);
        }

        function updateInventoryUI() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = ""; 
            if(!myData || !myData.inventory) return;

            myData.inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = "inv-item";
                div.innerHTML = `<span>${item.icon}</span><p>${item.name}</p>`;
                grid.appendChild(div);
            });
        }

        function update() {
            if (myPlayerContainer && !isInvOpen) {
                const speed = 200;
                myPlayerContainer.body.setVelocity(0);
                
                if (cursors.left.isDown) myPlayerContainer.body.setVelocityX(-speed);
                else if (cursors.right.isDown) myPlayerContainer.body.setVelocityX(speed);
                if (cursors.up.isDown) myPlayerContainer.body.setVelocityY(-speed);
                else if (cursors.down.isDown) myPlayerContainer.body.setVelocityY(speed);

                if (myPlayerContainer.body.velocity.x !== 0 || myPlayerContainer.body.velocity.y !== 0) {
                    this.socket.emit('playerMovement', { x: myPlayerContainer.x, y: myPlayerContainer.y });
                }

                // Checken, ob wir in der Nähe eines Items sind
                let nearbyItem = null;
                Object.values(itemsOnGround).forEach(itemSprite => {
                    const dist = Phaser.Math.Distance.Between(myPlayerContainer.x, myPlayerContainer.y, itemSprite.x, itemSprite.y);
                    if(dist < 40) nearbyItem = itemSprite; // Radius von 40 Pixeln
                });

                if(nearbyItem) {
                    interactText.setPosition(myPlayerContainer.x, myPlayerContainer.y - 50);
                    interactText.setText("[E] " + nearbyItem.itemName);
                    interactText.setVisible(true);

                    // Aufheben, wenn E gedrückt wird
                    if (Phaser.Input.Keyboard.JustDown(keyE)) {
                        this.socket.emit('pickupItem', nearbyItem.itemId);
                    }
                } else {
                    interactText.setVisible(false);
                }

            } else if (myPlayerContainer) {
                myPlayerContainer.body.setVelocity(0);
            }
        }
    </script>
</body>
</html>
