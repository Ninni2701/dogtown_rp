<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dogtown Edgerunners RP</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; image-rendering: pixelated; }

        /* Login Screen */
        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); padding: 30px; border: 2px solid #00ff00;
            color: #00ff00; text-align: center; z-index: 100; width: 80%; max-width: 400px;
            box-shadow: 0 0 20px #00ff00;
        }
        input { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin-bottom: 20px; font-family: 'Courier New'; text-align: center; width: 90%;}
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: 'Courier New';}

        /* Inventar Style */
        #inventory-ui {
            display: none; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%;
            background: rgba(30, 0, 5, 0.95); border: 2px solid #ff003c;
            color: #ff003c; z-index: 200; padding: 20px; box-shadow: 0 0 25px rgba(255, 0, 60, 0.7);
        }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; overflow-y: auto; max-height: 70%; }
        .inv-item { background: rgba(255, 0, 60, 0.1); border: 1px solid #ff003c; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 20px; right: 20px; z-index: 150; display: none; gap: 15px;
        }
        .mobile-btn {
            width: 70px; height: 70px; background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00;
            border-radius: 50%; color: #00ff00; font-weight: bold; display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>DOGTOWN TERMINAL</h1>
        <input type="text" id="username" placeholder="Runner Name..." maxlength="15"><br>
        <button id="start-btn">CONNECTION START</button>
    </div>

    <div id="inventory-ui">
        <h2 style="border-bottom: 2px solid #ff003c">INVENTORY // V.2077</h2>
        <div id="inv-grid" class="inv-grid"></div>
        <button onclick="toggleInv()" style="margin-top: 20px; background: #ff003c; color: #000; border:none; padding:10px;">CLOSE [I]</button>
    </div>

    <div id="mobile-controls">
        <div class="mobile-btn" id="btn-pickup">E</div>
        <div class="mobile-btn" id="btn-inv">INV</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            backgroundColor: '#050505', physics: { default: 'arcade' },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let socket, myPlayerContainer, joystick, myData, cursors, keyE, keyI;
        let otherPlayers, walls, itemsOnGround = {};
        let isInvOpen = false;
        let interactLabel; 
        let currentNearbyItem = null;

        function preload() {
            this.load.plugin('rexvirtualjoystickplugin', 'https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js', true);
        }

        function create() {
            const self = this;
            this.physics.world.setBounds(0, 0, 2000, 2000);

            otherPlayers = this.physics.add.group();
            walls = this.physics.add.staticGroup();
            
            walls.add(this.add.rectangle(400, 300, 200, 20, 0xff00ff));
            walls.add(this.add.rectangle(800, 800, 20, 300, 0x00ffff));

            interactLabel = this.add.text(0, 0, "", { 
                fontSize: '14px', fill: '#ffff00', backgroundColor: '#000', padding: {x: 5, y: 2} 
            }).setOrigin(0.5).setVisible(false).setDepth(1000);

            cursors = this.input.keyboard.createCursorKeys();
            keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
            keyI = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.I);

            if (this.sys.game.device.input.touch) {
                document.getElementById('mobile-controls').style.display = 'flex';
                joystick = this.plugins.get('rexvirtualjoystickplugin').add(this, {
                    x: 100, y: window.innerHeight - 100, radius: 50,
                    base: this.add.circle(0, 0, 50, 0x888888, 0.3),
                    thumb: this.add.circle(0, 0, 25, 0x00ff00, 0.5),
                });
                joystick.setScrollFactor(0); 
            }

            document.getElementById('btn-inv').onclick = () => toggleInv();
            document.getElementById('btn-pickup').onclick = () => tryPickup(self);

            document.getElementById('start-btn').onclick = () => {
                document.getElementById('ui-layer').style.display = 'none';
                this.socket = io();
                this.socket.emit('joinGame', { name: document.getElementById('username').value || "Choom" });
                setupSocketEvents(self);
            };
        }

        function toggleInv() {
            isInvOpen = !isInvOpen;
            document.getElementById('inventory-ui').style.display = isInvOpen ? 'block' : 'none';
            if(isInvOpen) updateInventoryUI();
        }

        function tryPickup(scene) {
            if(currentNearbyItem) scene.socket.emit('pickupItem', currentNearbyItem.itemId);
        }

        function setupSocketEvents(self) {
            self.socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (players[id].id === self.socket.id) {
                        myData = players[id];
                        addPlayer(self, players[id]);
                    } else { addOtherPlayers(self, players[id]); }
                });
            });

            self.socket.on('currentItems', (items) => {
                Object.keys(items).forEach(id => {
                    const item = items[id];
                    let sprite = self.add.text(item.x, item.y, item.icon, { fontSize: '24px' }).setOrigin(0.5);
                    sprite.itemId = item.id;
                    sprite.itemName = item.name;
                    itemsOnGround[item.id] = sprite;
                });
            });

            self.socket.on('itemRemoved', (itemId) => {
                if(itemsOnGround[itemId]) { itemsOnGround[itemId].destroy(); delete itemsOnGround[itemId]; }
            });

            self.socket.on('updateInventory', (newInv) => { myData.inventory = newInv; });
            self.socket.on('playerMoved', (pInfo) => {
                otherPlayers.getChildren().forEach((p) => { if (pInfo.id === p.playerId) p.setPosition(pInfo.x, pInfo.y); });
            });
            self.socket.on('playerDisconnected', (id) => {
                otherPlayers.getChildren().forEach((p) => { if(p.playerId === id) p.destroy(); });
            });
        }

        function addPlayer(self, playerInfo) {
            myPlayerContainer = self.add.container(playerInfo.x, playerInfo.y);
            myPlayerContainer.add([self.add.rectangle(0, 0, 32, 32, 0x00ff00), self.add.text(0, -25, playerInfo.name, { fontSize: '12px', fill: '#00ff00' }).setOrigin(0.5)]);
            self.physics.world.enable(myPlayerContainer);
            myPlayerContainer.body.setCollideWorldBounds(true);
            self.physics.add.collider(myPlayerContainer, walls);

            // STATISCHES FOLLOW: Lerp auf 1 (keine Verzögerung)
            self.cameras.main.startFollow(myPlayerContainer, true, 1, 1);
            self.cameras.main.setBounds(0, 0, 2000, 2000);
        }

        function addOtherPlayers(self, playerInfo) {
            const c = self.add.container(playerInfo.x, playerInfo.y);
            c.add([self.add.rectangle(0, 0, 32, 32, playerInfo.color), self.add.text(0, -25, playerInfo.name, { fontSize: '12px', fill: '#fff' }).setOrigin(0.5)]);
            c.playerId = playerInfo.id;
            otherPlayers.add(c);
        }

        function updateInventoryUI() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = ""; 
            if(!myData.inventory) return;
            myData.inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = "inv-item";
                div.innerHTML = `<span>${item.icon}</span><p style="font-size:10px">${item.name}</p>`;
                grid.appendChild(div);
            });
        }

        function update() {
            if (myPlayerContainer && !isInvOpen) {
                const speed = 200;
                myPlayerContainer.body.setVelocity(0);
                
                if (joystick && joystick.force > 0) {
                    this.physics.velocityFromAngle(joystick.angle, joystick.force * 2, myPlayerContainer.body.velocity);
                } else {
                    if (cursors.left.isDown) myPlayerContainer.body.setVelocityX(-speed);
                    else if (cursors.right.isDown) myPlayerContainer.body.setVelocityX(speed);
                    if (cursors.up.isDown) myPlayerContainer.body.setVelocityY(-speed);
                    else if (cursors.down.isDown) myPlayerContainer.body.setVelocityY(speed);
                }

                if (myPlayerContainer.body.velocity.x !== 0 || myPlayerContainer.body.velocity.y !== 0) {
                    this.socket.emit('playerMovement', { x: myPlayerContainer.x, y: myPlayerContainer.y });
                }

                if (Phaser.Input.Keyboard.JustDown(keyI)) toggleInv();

                currentNearbyItem = null;
                Object.values(itemsOnGround).forEach(sprite => {
                    const dist = Phaser.Math.Distance.Between(myPlayerContainer.x, myPlayerContainer.y, sprite.x, sprite.y);
                    if(dist < 50) currentNearbyItem = sprite;
                });

                if(currentNearbyItem) {
                    interactLabel.setPosition(myPlayerContainer.x, myPlayerContainer.y - 55);
                    interactLabel.setText("[E] " + currentNearbyItem.itemName);
                    interactLabel.setVisible(true);
                    if (Phaser.Input.Keyboard.JustDown(keyE)) tryPickup(this);
                } else {
                    interactLabel.setVisible(false);
                }
            }
        }
    </script>
</body>
</html>
